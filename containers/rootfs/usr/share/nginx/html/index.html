<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用 Nginx!</title>
    <style>
        /* 全局变量与主题定义 */
        :root {
            --primary-color: #009639; /* Nginx 标志性的绿色 */
            --primary-hover: #00752d;
            --bg-gradient-start: #f0f2f5;
            --bg-gradient-end: #e2e8f0;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #4a5568;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 暗黑模式适配 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #1a202c;
                --bg-gradient-end: #2d3748;
                --card-bg: #2d3748;
                --text-main: #f7fafc;
                --text-muted: #a0aec0;
                --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            }
        }

        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
        }

        /* 主容器卡片 */
        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
        }

        /* 图标区域 */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background-color: rgba(0, 150, 57, 0.1); /* primary color with low opacity */
            border-radius: 50%;
            margin-bottom: 24px;
        }

        .icon svg {
            width: 40px;
            height: 40px;
            color: var(--primary-color);
            fill: currentColor;
        }

        /* 文本排版 */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 16px;
        }

        /* 分隔线 */
        .divider {
            height: 1px;
            background-color: var(--text-muted);
            opacity: 0.2;
            margin: 32px 0;
        }

        /* 链接按钮区域 */
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 150, 57, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 2px solid rgba(160, 174, 192, 0.3);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: rgba(0, 150, 57, 0.05);
        }

        /* 页脚 */
        footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
        }

        footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
            </div>
        </div>
        <h1>Nginx 服务已成功运行</h1>
        <p>如果您看到此页面，说明 Nginx web 服务器已成功安装并正常工作。这是默认的欢迎页面。</p>
        
        <div class="divider"></div>
        
        <div class="actions">
            <a href="https://nginx.org/en/docs/" target="_blank" class="btn btn-primary">官方文档</a>
            <a href="https://community.nginx.org/" target="_blank" class="btn btn-secondary">获取支持</a>
        </div>

        <footer>
            <p>Powered by <a href="https://nginx.org" target="_blank">nginx</a>. 感谢使用。</p>
        </footer>
    </div>
</body>
</html>
