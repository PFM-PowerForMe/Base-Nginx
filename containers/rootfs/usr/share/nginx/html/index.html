<!DOCTYPE html>
<html lang="zh" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PKG Build Repo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            color: #1e293b;
            line-height: 1.6
        }

        .hero {
            max-width: 720px;
            margin: 0 auto;
            padding: 72px 24px 48px;
            text-align: center
        }

        .hero-logo {
            object-fit: contain
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: #ea580c;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 9999px;
            padding: 5px 14px;
            margin-bottom: 20px
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: -.03em;
            margin-bottom: 16px
        }

        .hero p {
            font-size: 17px;
            color: #64748b;
            max-width: 520px;
            margin: 0 auto 28px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            max-width: 720px;
            margin: 32px auto 0;
            padding: 0 24px
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            text-align: left
        }

        .card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .card p {
            font-size: 13px;
            color: #64748b
        }

        .cta {
            display: inline-block;
            margin-top: 8px;
            padding: 13px 26px;
            border-radius: 10px;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            background: #ea580c
        }
    </style>
</head>

<body class="">
    <div class="hero">


        <h1 class="">编译镜像站 PKG Build Repo</h1>
        <p class="">本站点仅内部授权使用,未授权无法使用.详情了解联系站长.</p>

    </div>


</body>

</html>
